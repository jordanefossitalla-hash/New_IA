version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    container_name: ingestion-db
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ingestion_network

  redis:
    image: redis:7-alpine
    container_name: ingestion-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ingestion_network

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: ingestion-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-development}
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-c", "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"]
    networks:
      - ingestion_network

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    container_name: ingestion-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      APP_ENV: ${APP_ENV:-development}
      CELERY_LOG_LEVEL: ${CELERY_LOG_LEVEL:-INFO}
    volumes:
      - ./:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-c", "celery -A app.worker.celery_app:celery_app worker --loglevel=${CELERY_LOG_LEVEL:-INFO}"]
    networks:
      - ingestion_network

volumes:
  postgres_data:
    name: ingestion_postgres_data
  redis_data:
    name: ingestion_redis_data

networks:
  ingestion_network:
    name: ingestion_network
    driver: bridge
